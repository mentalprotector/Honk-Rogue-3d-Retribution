<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HonkRogue 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #f1c40f;
            --danger: #e74c3c;
            --info: #3498db;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Inter', sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }

        /* Typography */
        h1, h2, h3, #stage-notification, #menu-title {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Panels */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px;
        }

        #hp-bar-fill {
            width: 200px;
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #hp-bar-current {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Buttons */
        button {
            font-family: 'Luckiest Guy', cursive;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            pointer-events: auto;
            text-transform: uppercase;
            border: none;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        button:hover {
            transform: scale(1.05) translateY(-2px);
            filter: brightness(1.1);
        }
        button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-bottom: 4px solid #96281b;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-bottom: 4px solid #1f3a93;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        #menu-title {
            animation: float 3s ease-in-out infinite;
            font-size: 80px;
            color: var(--accent);
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #btn-start {
            animation: pulse 2s infinite;
        }

        /* Mobile Layout Adjustments */
        @media (max-width: 800px) {
            #menu-title {
                font-size: 40px !important;
                text-align: center;
                width: 100%;
            }
            #menu-subtitle {
                font-size: 16px !important;
                text-align: center;
            }
            #cards-container {
                flex-direction: column;
                gap: 15px !important;
                height: 85% !important;
                margin-top: -20px;
            }
            .upgrade-card {
                width: 280px !important;
                height: 100px !important;
                flex-direction: row !important;
                padding: 10px 20px !important;
            }
        }

        /* Screen Fade Overlay */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            z-index: 5000;
        }
    </style>

    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <!-- Level Badge -->
        <div id="stage-badge" class="glass-panel" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); padding: 4px 15px; color: var(--accent); font-weight: bold; font-family: 'Luckiest Guy', cursive; font-size: 16px;">
            STAGE 1
        </div>

        <!-- Health & Status -->
        <div id="hud" class="glass-panel">
            <div style="font-size: 20px; color: white; margin-bottom: 8px; font-family: 'Luckiest Guy', cursive;">GOOSE STATUS</div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div id="hp-bar-fill">
                    <div id="hp-bar-current"></div>
                </div>
                <div id="hp-text" style="color: white; font-size: 14px; font-weight: bold; min-width: 40px;">10/10</div>
            </div>
            <div id="status-icons" style="margin-top: 10px; display: flex; gap: 8px; font-size: 20px;"></div>
        </div>

        <!-- Stats Button -->
        <button id="btnStats" class="glass-panel" style="position: absolute; top: 140px; left: 20px; padding: 0; color: white; font-family: 'Luckiest Guy', cursive; font-size: 24px; pointer-events: auto; border: 1px solid var(--glass-border); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; z-index: 100;">
            📊
        </button>

        <!-- Stats Panel -->
        <div id="stats-panel" class="glass-panel" style="position: absolute; top: 190px; left: 20px; padding: 15px; width: 220px; display: none; flex-direction: column; color: white; pointer-events: auto; max-height: 300px; overflow-y: auto; z-index: 100;">
            <div style="color: var(--accent); font-family: 'Luckiest Guy', cursive; font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">COLLECTED</div>
            <div id="stats-list" style="font-size: 13px; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; gap: 6px;"></div>
        </div>

        <!-- Zoom Switcher -->
        <button id="btnZoom" class="glass-panel" style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; color: white; font-family: 'Luckiest Guy', cursive; font-size: 18px; pointer-events: auto; border: 1px solid var(--glass-border);">
            ZOOM: +
        </button>

        <!-- Notification -->
        <div id="stage-notification" style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; color: var(--accent); font-size: 40px; text-shadow: 4px 4px 0 #000; transition: all 0.5s; pointer-events: none;">
            STAGE 1
        </div>

        <!-- Off-screen Indicator -->
        <div id="offscreen-indicator" style="position: absolute; width: 50px; height: 50px; pointer-events: none; display: none; z-index: 100;">
            <svg viewBox="0 0 100 100" style="width: 100%; height: 100%; fill: var(--accent); filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.8));">
                <path d="M 50,0 L 90,50 L 65,50 L 65,100 L 35,100 L 35,50 L 10,50 Z" />
            </svg>
        </div>

        <div id="controls" style="position: absolute; bottom: 40px; right: 40px; display: none; z-index: 1000; touch-action: none; pointer-events: auto; align-items: flex-end;">
            <div id="wrapperAttack" style="position: relative; width: 90px; height: 90px;">
                <div id="cdAttack" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(rgba(0,0,0,0.6) 0%, transparent 0%); pointer-events: none; z-index: 1; border: 4px solid transparent;"></div>
                <div id="timerAttack" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: 'Luckiest Guy', cursive; font-size: 24px; text-shadow: 2px 2px 0 #000; z-index: 2; pointer-events: none; display: none;">0.0</div>
                <button id="btnAttack" style="width: 100%; height: 100%; border-radius: 50%; background: var(--danger); border: 4px solid white; font-size: 24px; font-family: 'Luckiest Guy', cursive; pointer-events: auto;">ATK</button>
            </div>
            <div id="wrapperDash" style="position: relative; width: 70px; height: 70px; margin-left: 20px;">
                <div id="cdDash" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(rgba(0,0,0,0.6) 0%, transparent 0%); pointer-events: none; z-index: 1; border: 4px solid transparent;"></div>
                <div id="timerDash" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: 'Luckiest Guy', cursive; font-size: 18px; text-shadow: 2px 2px 0 #000; z-index: 2; pointer-events: none; display: none;">0.0</div>
                <button id="btnDash" style="width: 100%; height: 100%; border-radius: 50%; background: var(--info); border: 4px solid white; font-size: 18px; font-family: 'Luckiest Guy', cursive; pointer-events: auto;">DSH</button>
            </div>
        </div>

        <!-- Fullscreen Menus -->
        <div id="menu-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; pointer-events: auto; z-index: 2000;">
            <h1 id="menu-title">HONK ROGUE</h1>
            <p id="menu-subtitle" style="margin-bottom: 40px; font-size: 20px; color: #888;">Agentic Edition</p>
            <button id="btn-start" class="btn-primary" style="padding: 25px 60px; font-size: 30px;">START HONKING</button>
            <button id="btn-resume" class="btn-secondary" style="padding: 25px 60px; font-size: 30px; display: none; margin-top: 20px;">RESUME</button>
            <button id="btn-restart" class="btn-secondary" style="padding: 25px 60px; font-size: 30px; display: none; margin-top: 20px;">RESTART</button>
            <div class="glass-panel" style="margin-top: 40px; padding: 25px; width: 320px;">
                <div style="color: var(--accent); margin-bottom: 15px; font-weight: bold; text-align: center; font-family: 'Luckiest Guy', cursive;">GAMEPLAY:</div> 
                <div style="text-align: left; font-size: 14px; line-height: 1.8; color: #ccc;">
                    ⌨️ <b>PC:</b> WASD to Move / MOUSE to Aim<br>
                    ⚔️ <b>CLICK / SPACE:</b> Attack / Charge<br>
                    💨 <b>SHIFT:</b> Quick Dash
                </div>
            </div>
        </div>

        <!-- Upgrade Menu -->
        <div id="upgrade-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; pointer-events: auto;">
            <h2 style="font-size: 36px; color: var(--accent); margin-bottom: 10px;">LEVEL CLEARED!</h2>
            <p style="margin-bottom: 40px; font-size: 20px; color: #888;">Choose your mutation:</p>
            <div id="cards-container" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;"></div>
        </div>
    <!-- Screen Fade Overlay -->
    <div id="screen-fade" class="fade-overlay"></div>

    <!-- Main Entry -->
    <script type="module" src="src/index.js"></script>
</body>
</html>
